<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>书雪书阁 | Elowen’s Book Pavilion</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
  :root{
    --glass: rgba(255,255,255,0.12);
    --accent: #ffd9a6;
    --text: #fff;
  }

  html, body {
    margin: 0;
    padding: 0;
    font-family: "Noto Serif SC", serif;
    color: var(--text);
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* 背景：木屋 · 湖面 · 森林 · 冬季 · 夜景 · 暖灯光 */
  body {
    background:
      linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
      url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1600&q=80')
      center/cover fixed;
  }

  /* 顶部区域 */
  .hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
    transition: all .45s ease;
    position: relative;
  }

  .hero h1 {
    font-family: "Playfair Display", serif;
    font-size: 56px;
    margin: 0 0 8px;
    letter-spacing: 2px;
    text-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }

  .hero p {
    margin: 0;
    font-size: 18px;
    opacity: .95;
  }

  /* 下滑提示 */
  .scroll-hint {
    position: absolute;
    bottom: 28px;
    opacity: 0;
    transition: opacity .45s ease;
    pointer-events: none;
    text-align: center;
  }

  .scroll-hint.show { opacity: .85; }

  .scroll-hint .arrow {
    width: 22px;
    height: 22px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg);
    margin: 0 auto;
    animation: bounce 1.6s infinite;
  }

  @keyframes bounce {
    0% { transform: translateY(0) rotate(-45deg); }
    50% { transform: translateY(8px) rotate(-45deg); }
    100% { transform: translateY(0) rotate(-45deg); }
  }

  /* 固定导航栏 */
  .hero.shrink {
    height: 72px;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    padding: 10px 20px;
    z-index: 999;
  }

  .hero.shrink h1 {
    font-size: 22px;
  }

  /* 占位元素 */
  #hero-placeholder {
    height: 0;
    transition: height .45s ease;
  }

  /* 内容区 */
  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 40px 20px;
    box-sizing: border-box;
  }

  .content {
    opacity: 0;
    transform: translateY(30px);
    transition: all .6s ease;
  }

  .content.show {
    opacity: 1;
    transform: translateY(0);
  }

  .card {
    background: var(--glass);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 20px;
    backdrop-filter: blur(6px);
    transition: transform .25s, box-shadow .25s;
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
  }

  .card h2 {
    margin: 0 0 8px;
    font-size: 24px;
  }

  .card p {
    margin: 0 0 12px;
    color: rgba(255,255,255,0.92);
  }

  .card a {
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
  }

  .card a:hover {
    text-decoration: underline;
  }

  /* 雪花 */
  .snowflake {
    position: fixed;
    top: -10px;
    color: #fff;
    opacity: 0.9;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 1001;
  }

  @keyframes fall {
    0% { transform: translateY(-10vh) translateX(0) rotate(0deg); }
    100% { transform: translateY(110vh) translateX(40px) rotate(360deg); }
  }

</style>
</head>

<body>

<header class="hero" id="hero">
  <h1>书雪书阁 · Elowen’s Book Pavilion</h1>
  <p>窗外雪落，灯下故事正在等你</p>

  <div class="scroll-hint" id="scrollHint">
    <div class="arrow"></div>
    <div class="text">轻轻向下</div>
  </div>
</header>

<div id="hero-placeholder"></div>

<main class="content" id="content">

  <section class="card">
    <h2>《梦雪》</h2>
    <p>一段关于雪、梦境与命运的故事。</p>
    <a href="novels/novel1/index.html" target="_blank">开始阅读 →</a>
  </section>

  <section class="card">
    <h2>作者介绍</h2>
    <p>了解作者、创作理念与留言互动。</p>
    <a href="author.html">查看作者页面 →</a>
  </section>

</main>

<script>
/* 雪花 */
(function(){
  function createSnow(){
    const el = document.createElement('div');
    el.className = 'snowflake';
    el.textContent = '❄';
    el.style.left = Math.random() * window.innerWidth + 'px';
    el.style.fontSize = (10 + Math.random() * 20) + 'px';
    el.style.animationDuration = (4 + Math.random() * 6) + 's';
    document.body.appendChild(el);
    setTimeout(()=> el.remove(), 10000);
  }
  setInterval(createSnow, 150);
})();

/* 滚动逻辑 */
(function(){
  const hero = document.getElementById('hero');
  const placeholder = document.getElementById('hero-placeholder');
  const content = document.getElementById('content');
  const hint = document.getElementById('scrollHint');

  setTimeout(()=> hint.classList.add('show'), 600);

  function apply(){
    if(window.scrollY > 100){
      if(!hero.classList.contains('shrink')){
        const h = hero.getBoundingClientRect().height;
        placeholder.style.height = h + 'px';
        hero.classList.add('shrink');
      }
      content.classList.add('show');
      hint.classList.remove('show');
    } else {
      hero.classList.remove('shrink');
      placeholder.style.height = '0';
      content.classList.remove('show');
      hint.classList.add('show');
    }
  }

  window.addEventListener('scroll', ()=> requestAnimationFrame(apply));
  document.addEventListener('DOMContentLoaded', apply);
})();
</script>

</body>
</html>
