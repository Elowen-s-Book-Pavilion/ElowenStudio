<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>书雪书阁 | Elowen’s Book Pavilion</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: "Noto Serif SC", serif;
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        /* 半透明背景层 */
        .overlay {
            background: rgba(0,0,0,0.55);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        header {
            text-align: center;
            padding: 60px 20px;
        }

        header h1 {
            font-family: "Playfair Display", serif;
            font-size: 48px;
            margin: 0;
            letter-spacing: 3px;
        }

        header p {
            font-size: 20px;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* 雪花效果 */
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 18px;
            animation: fall 10s linear infinite;
            opacity: 0.8;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }

        /* 内容容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 小说卡片 */
        .book-card {
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(8px);
            transition: transform 0.3s;
        }

        .book-card:hover {
            transform: translateY(-8px);
        }

        .book-card h2 {
            margin-top: 0;
            font-size: 28px;
        }

        a {
            color: #cce0ff;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* 作者介绍 */
        .author-section {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            margin-top: 40px;
            backdrop-filter: blur(8px);
        }

        /* 留言区 */
        .comment-box {
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 15px;
            margin-top: 40px;
            backdrop-filter: blur(8px);
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #aac8ff;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #cce0ff;
        }
    </style>
</head>

<body>
<div class="overlay">

    <!-- 雪花 -->
    <div class="snowflake">❄</div>
    <div class="snowflake" style="left: 20%;">❄</div>
    <div class="snowflake" style="left: 40%;">❄</div>
    <div class="snowflake" style="left: 60%;">❄</div>
    <div class="snowflake" style="left: 80%;">❄</div>

    <header>
        <h1>书雪书阁 · Elowen’s Book Pavilion</h1>
        <p>欢迎来到我的小说世界</p>
    </header>

    <div class="container">

        <!-- 小说展示 -->
        <div class="book-card">
            <h2>《梦雪》</h2>
            <p>一段关于雪、梦境与命运的故事。</p>
            <a href="novels/novel1/index.html">开始阅读 →</a>
        </div>

        <!-- 作者介绍 -->
        <div class="author-section">
            <h2>作者介绍</h2>
            <p>这里可以写你的作者简介，例如你的创作理念、你的世界观、你为什么写这本小说。</p>
            <a href="author.html">查看完整作者页面 →</a>
        </div>

        <!-- 留言区 -->
        <div class="comment-box">
            <h2>留言区</h2>
            <textarea placeholder="写下你的想法、评论或建议..."></textarea>
            <button onclick="alert('留言功能需要后端支持，GitHub Pages 不支持，但我可以帮你用第三方留言系统实现！')">提交留言</button>
        </div>

    </div>
</div>
</body>
</html>
